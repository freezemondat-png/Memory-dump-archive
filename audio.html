<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NORTH // CORRUPTED AUDIO NODE</title>
<style>
body {
    background: #050507;
    color: #d1d1d1;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

button {
    padding: 12px 20px;
    background: #111;
    color: #fff;
    border: 1px solid #333;
    cursor: pointer;
}

button:hover {
    background: #222;
}

#status {
    margin-top: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h2>NORTH // MEMORY AUDIO FRAGMENT</h2>

<button onclick="playGlitchAudio()">PLAY CORRUPTED LOG</button>

<div id="status">SYSTEM IDLE...</div>

<script>

let audioCtx;

function playGlitchAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    document.getElementById("status").innerText = "DECODING MEMORY FRAGMENT...";

    // Create noise buffer (static corruption layer)
    let bufferSize = audioCtx.sampleRate * 2;
    let noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    let output = noiseBuffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.4;
    }

    let noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;

    let noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = "bandpass";
    noiseFilter.frequency.value = 800;
    noiseFilter.Q.value = 1;

    let gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.2;

    noise.connect(noiseFilter);
    noiseFilter.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    noise.start();

    // Create distorted "voice" tone (North fragment)
    let osc = audioCtx.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.value = 110; // deep drone base

    let voiceFilter = audioCtx.createBiquadFilter();
    voiceFilter.type = "lowpass";
    voiceFilter.frequency.value = 400;

    let voiceGain = audioCtx.createGain();
    voiceGain.gain.value = 0.3;

    osc.connect(voiceFilter);
    voiceFilter.connect(voiceGain);
    voiceGain.connect(audioCtx.destination);

    osc.start();

    // Corruption modulation (pitch instability)
    setInterval(() => {
        osc.frequency.value = 100 + Math.random() * 40;
        voiceFilter.frequency.value = 300 + Math.random() * 200;
        gainNode.gain.value = 0.15 + Math.random() * 0.2;
    }, 120);

    // “hidden message” timing pulse (like North speaking under distortion)
    setTimeout(() => {
        document.getElementById("status").innerText =
        "FRAGMENT DETECTED: '...don't let me overheat...'";
    }, 2500);

    setTimeout(() => {
        document.getElementById("status").innerText =
        "FRAGMENT DETECTED: '...I can feel it deleting me again...'";
    }, 6000);

    setTimeout(() => {
        document.getElementById("status").innerText =
        "SIGNAL LOSS // NORTH CORE UNSYNCHRONIZED";
    }, 10000);
}

</script>

</body>
</html>
