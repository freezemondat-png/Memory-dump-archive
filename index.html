<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>NORTH ARG // ASH PROTOCOL</title>
<style>
body{margin:0;background:black;color:#d1d1d1;font-family:monospace;overflow:hidden}
.glitch{animation:g .2s infinite}
@keyframes g{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(2px,-1px)}
60%{transform:translate(-1px,1px)}
100%{transform:translate(0)}
}
canvas{display:block}
button{background:black;color:white;border:1px solid white;padding:10px;margin:5px}
</style>
</head>

<body>

<pre id="t"></pre>
<canvas id="c" style="display:none"></canvas>

<div id="ui"></div>

<script>
let stage=0;
let ui=document.getElementById("ui");
let t=document.getElementById("t");
let canvas=document.getElementById("c");
let x=canvas.getContext("2d");

function glitchText(el,text){
let chars="!<>-_\\/[]{}—=+*^?#________",i=0;
let interval=setInterval(()=>{
el.innerText=text.split("").map((c,idx)=>idx<i?text[idx]:chars[Math.random()*chars.length|0]).join("");
i+=1/3;
if(i>=text.length)clearInterval(interval);
},30);
}

function boot(){
glitchText(t,
`ASH PROTOCOL INITIALIZING...
DRONE INDEX: FAIL
UNKNOWN ENTITY: N0RTH?
DO NOT REBUILD WHAT WAS DISASSEMBLED.`
);
setTimeout(()=>{stage=1;feed();},4000);
}

function feed(){
t.style.display="none";
canvas.style.display="block";
canvas.width=innerWidth;
canvas.height=innerHeight;

function draw(){
x.fillStyle="black";
x.fillRect(0,0,canvas.width,canvas.height);

x.fillStyle="#0f0";
x.font="20px monospace";
x.fillText("CAM 03 // SECTOR 9",50,50);

if(Math.random()>0.97){
x.fillStyle="red";
x.fillText("N0RTH DETECTED",50,100);
}

requestAnimationFrame(draw);
}
draw();

setTimeout(()=>{stage=2;logs();},5000);
}

function logs(){
canvas.style.display="none";
t.style.display="block";

glitchText(t,`
DRONE: N0RTH?
STATUS: CORRUPTED

"i still feel the heat under the metal"

OVERHEAT: 17
MEMORY LOSS: 42

HE IS STILL UNDER THE STRUCTURE
`);

setTimeout(()=>{stage=3;watch();},5000);
}

function watch(){
t.style.display="none";
document.body.style.background="black";

document.onmousemove=e=>{
if(Math.random()>0.95){
let d=document.createElement("div");
d.innerText="N";
d.style.position="absolute";
d.style.left=e.pageX+"px";
d.style.top=e.pageY+"px";
d.style.color="red";
document.body.appendChild(d);
setTimeout(()=>d.remove(),500);
}
};

let p=document.createElement("div");
p.innerHTML="<br><br><button onclick='archive()'>NEXT NODE</button>";
document.body.appendChild(p);
}

function archive(){
document.body.innerHTML=`
<pre>
PROJECT: NORTH
TYPE: DISASSEMBLY VARIANT

emotion suppression failed

"does not want to be rebuilt"
</pre>
<button onclick="finale()">FINAL NODE</button>
`;
}

function finale(){
document.body.innerHTML=`
<h1 class="glitch">NORTH ACTIVE</h1>
<p>
Matte black Disassembly Drone.<br>
Hooded. Slumped. Crimson visor.<br><br>
"I was not meant to stay online."
</p>
<button onclick="choice('r')">REINTEGRATE</button>
<button onclick="choice('s')">SEAL</button>
`;

window.choice=function(c){
if(c=='r'){
document.body.innerHTML="<h1>RECONNECTED</h1><p>NORTH RESTORED</p>";
}else{
document.body.innerHTML="<h1>SEALED</h1><p>but still present</p>";
}
}
}

boot();
</script>

</body>
</html>
