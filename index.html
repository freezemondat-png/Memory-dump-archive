<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>HERO FILE // NORTH</title>

<style>
body{
margin:0;
background:#050814;
color:#dbe7ff;
font-family:monospace;
overflow:hidden;
text-align:center;
}

.hidden{display:none}

.glitch{
animation:g .2s infinite;
}

@keyframes g{
0%{transform:translate(0)}
25%{transform:translate(-2px,1px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-1px,2px)}
100%{transform:translate(0)}
}

button{
background:#000;
color:#dbe7ff;
border:1px solid #4a6cf7;
padding:12px;
margin:6px;
cursor:pointer;
}

#box{
margin-top:120px;
padding:20px;
}

#hint{
opacity:0.5;
font-size:12px;
margin-top:20px;
}
</style>
</head>

<body>

<div id="box">

<h1>HERO PUBLIC SAFETY COMMISSION</h1>
<p>RESTRICTED FILE: <span class="glitch">NORTH</span></p>

<div id="scene"></div>

<div id="buttons"></div>

<div id="hint"></div>

</div>

<script>

/* ======================
   SIMPLE ARG STATE
====================== */

let step = 0;
let clicks = 0;

const scene = document.getElementById("scene");
const buttons = document.getElementById("buttons");
const hint = document.getElementById("hint");

/* ======================
   PUZZLE TEXT SYSTEM
====================== */

function show(text){
scene.innerHTML = "<p>"+text+"</p>";
}

/* ======================
   STEP SYSTEM
====================== */

function render(){

buttons.innerHTML = "";

if(step === 0){
show("FILE OPENED... BUT SOME DATA IS MISSING.");

addButton("TRY TO READ FILE", next);
hint.innerText="Something is hidden in the missing parts.";
}

if(step === 1){
show("SUBJECT: NORTH\nSTATUS: UNKNOWN HERO TYPE\n\nONE LINE IS CORRUPTED.");

addButton("FIX THE LINE", next);
hint.innerText="Not everything is supposed to be read directly.";
}

if(step === 2){
show("CORRUPTED LINE REVEALED:\n\n'I never wanted to be a hero like this.'");

addButton("CONTINUE", next);
hint.innerText="Why would a hero file say that?";
}

if(step === 3){
show("A MESSAGE APPEARS:\n\nIF YOU ARE READING THIS... YOU ARE BEING OBSERVED.");

addButton("LOOK AROUND", next);
hint.innerText="Try interacting more...";
}

if(step === 4){
show("NEW FILE UNLOCKED:\n\nNORTH WAS NEVER REGISTERED.\nHE WAS LEFT INSIDE THE SYSTEM.");

addButton("OPEN FINAL FILE", next);
hint.innerText="Final choice incoming.";
}

if(step === 5){
show("<span class='glitch'>NORTH ACTIVE</span>\n\nA hero who was never officially allowed to exist.");

addButton("ACCEPT AS HERO", endAccept);
addButton("SEAL FILE", endSeal);

hint.innerText="Your choice changes the record.";
}

}

/* ======================
   BUTTON HELPERS
====================== */

function addButton(text, fn){
let b=document.createElement("button");
b.innerText=text;
b.onclick=fn;
buttons.appendChild(b);
}

/* ======================
   PROGRESSION
====================== */

function next(){
step++;
clicks++;
render();
}

/* ======================
   ENDINGS
====================== */

function endAccept(){
document.body.innerHTML=`
<div id="box">
<h1>FILE UPDATED</h1>
<p>NORTH HAS BEEN REGISTERED AS A HERO.</p>
<p class="glitch">BUT THE SYSTEM STILL KEEPS A COPY.</p>
</div>
`;
}

function endSeal(){
document.body.innerHTML=`
<div id="box">
<h1>FILE SEALED</h1>
<p>NORTH HAS BEEN ERASED FROM PUBLIC RECORD.</p>
<p class="glitch">BUT SOMETHING IS STILL RUNNING.</p>
</div>
`;
}

/* start */
render();

</script>

</body>
</html>
