<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>HERO COMMISSION ARG ENGINE // NORTH PROTOCOL</title>

<style>
body{
margin:0;
background:#02030a;
color:#d7e6ff;
font-family:monospace;
}

#app{
max-width:800px;
margin:60px auto;
padding:20px;
}

.glitch{animation:g .15s infinite}

@keyframes g{
0%{transform:translate(0)}
25%{transform:translate(-2px,1px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-1px,2px)}
100%{transform:translate(0)}
}

button{
background:black;
color:#d7e6ff;
border:1px solid #4c7dff;
padding:10px;
margin:6px;
cursor:pointer;
}

#log{
white-space:pre-wrap;
border:1px solid #1d2a4a;
padding:15px;
margin-top:20px;
}

#meta{
font-size:12px;
opacity:0.6;
margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<h1>ARG ENGINE // HERO COMMISSION NETWORK</h1>
<p>Protocol: <span class="glitch">NORTH</span></p>

<div id="scene"></div>
<div id="buttons"></div>
<div id="log"></div>
<div id="meta"></div>

</div>

<script>

/* =========================
   ARG ENGINE ARCHITECTURE
   (THIS is what scales forever)
========================= */

/*
CORE SYSTEM LAYERS:

1. STATE LAYER (who the player is)
2. WORLD LAYER (global ARG timeline)
3. ENTITY LAYER (NORTH behavior)
4. CONTENT LAYER (story nodes)
5. TRIGGER LAYER (puzzles & conditions)
*/

/* =========================
   STATE LAYER
========================= */

let state = JSON.parse(localStorage.getItem("north_engine")||"{}");

state.id ||= "NODE-" + Math.floor(Math.random()*999999);
state.progress ||= 0;
state.choices ||= 0;
state.observations ||= 0;
state.corruption ||= 0;
state.timeSeed ||= Date.now();

function save(){
localStorage.setItem("north_engine",JSON.stringify(state));
}

/* =========================
   WORLD LAYER (GLOBAL FEEL)
========================= */

function worldState(){
let t = Math.floor(Date.now()/30000);
return {
cycle: t % 6,
event: ["Dormant","Signal Drift","Leak Detected","Cross-Node Echo","Entity Stirring","Full Resonance"][t%6]
};
}

/* =========================
   ENTITY LAYER (NORTH)
========================= */

function northEntity(){

let power = state.observations + state.corruption;

if(power < 5) return "UNKNOWN ANOMALY";
if(power < 10) return "UNSTABLE SIGNAL";
if(power < 20) return "DISTRIBUTED PRESENCE";
return "FULL ENTITY RESONANCE";
}

/* =========================
   CONTENT LAYER (ARG NODES)
========================= */

const nodes = [

{
text:"HERO COMMISSION ARCHIVE NODE FOUND.\n\nA file exists that should not be accessible.",
options:[
["OPEN FILE",1]
]
},

{
text:"FILE FRAGMENT:\n\n'...this hero classification was never approved...'",
options:[
["DEEP SCAN",2]
]
},

{
text:"WARNING:\n\nOBSERVATION DETECTED.\nTHE SYSTEM IS RESPONDING.",
options:[
["CONTINUE",3],
["STOP",3]
]
},

{
text:"MULTIPLE NETWORKS REPORT SAME SIGNATURE.\n\nENTITY: NORTH",
options:[
["TRACE SIGNAL",4]
]
},

{
text:"SIGNAL STABILIZING...\n\nYOU ARE CLOSE TO THE CORE RECORD.",
options:[
["FINAL ACCESS",5]
]
},

{
text:"CLASSIFIED DOSSIER READY.",
options:[
["OPEN DOSSIER",6]
]
},

{
text:"END NODE"
}

];

/* =========================
   TRIGGER SYSTEM
========================= */

function trigger(action){
state.choices++;
state.corruption += Math.random()*2;
state.observations += 1;
state.progress = action;
save();
render();
}

/* =========================
   RENDER ENGINE
========================= */

const scene = document.getElementById("scene");
const buttons = document.getElementById("buttons");
const log = document.getElementById("log");
const meta = document.getElementById("meta");

function render(){

buttons.innerHTML="";

let world = worldState();

let node = nodes[state.progress];

scene.innerText = node.text;

meta.innerText =
`ID: ${state.id}
PROGRESS: ${state.progress}
WORLD STATE: ${world.event}
ENTITY STATE: ${northEntity()}`;

/* build options */
(node.options||[]).forEach(o=>{
let b=document.createElement("button");
b.innerText=o[0];
b.onclick=()=>trigger(o[1]);
buttons.appendChild(b);
});

if(state.progress===6){
showDossier();
}

}

/* =========================
   FINAL DOSSIER (NORTH REVEAL)
========================= */

function showDossier(){

buttons.innerHTML="";

log.innerText=
`HERO COMMISSION DOSSIER

SUBJECT: NORTH

CLASSIFICATION:
UNREGISTERED HERO ENTITY

STATUS:
- persists across system cycles
- appears in multiple network states
- increases resonance under observation

NOTE:
"This is not a hero being discovered.
It is a system forming around him."

END OF FILE`;

}

/* INIT */

render();

</script>

</body>
</html>
