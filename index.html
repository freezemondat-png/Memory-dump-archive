<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>HERO COMMISSION NETWORK // NORTH PROTOCOL</title>

<style>
body{
margin:0;
background:#02030a;
color:#d6e4ff;
font-family:monospace;
text-align:center;
}

.wrap{
max-width:800px;
margin:60px auto;
padding:20px;
}

.glitch{
animation:g .15s infinite;
}

@keyframes g{
0%{transform:translate(0)}
25%{transform:translate(-2px,1px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-1px,2px)}
100%{transform:translate(0)}
}

button{
background:black;
color:#d6e4ff;
border:1px solid #4f7cff;
padding:10px;
margin:6px;
cursor:pointer;
}

#log{
white-space:pre-wrap;
text-align:left;
border:1px solid #1d2a44;
padding:15px;
margin-top:20px;
display:none;
}
</style>
</head>

<body>

<div class="wrap">

<h1>HERO COMMISSION NETWORK</h1>
<p>CLASSIFIED ARG SYSTEM // ENTITY: <span class="glitch">NORTH</span></p>

<div id="scene"></div>
<div id="buttons"></div>
<div id="log"></div>

</div>

<script>

/* =========================
   PERSISTENT ARG STATE
========================= */

let state = JSON.parse(localStorage.getItem("north_arg")||"{}");

state.progress ||= 0;
state.visits ||= 0;
state.corruption ||= 0;
state.phase ||= Math.floor(Date.now()/30000)%6;

function save(){
localStorage.setItem("north_arg",JSON.stringify(state));
}

/* =========================
   WORLD PHASE SYSTEM
========================= */

function worldPhase(){
let t = Math.floor(Date.now()/25000);
let phases = [
"DORMANT GRID",
"SIGNAL DRIFT",
"ARCHIVE DISTORTION",
"CROSS NODE ECHO",
"ENTITY RESONANCE",
"FULL BREACH"
];
return phases[t % phases.length];
}

/* =========================
   NORTH ENTITY ENGINE
========================= */

function northState(){
let power = state.visits + state.corruption;

if(power < 5) return "UNKNOWN FILE FRAGMENT";
if(power < 10) return "SIGNAL ECHO";
if(power < 18) return "DISTRIBUTED PRESENCE";
return "ACTIVE SYSTEM ANOMALY";
}

/* =========================
   ARG NODES (FULL STORY MAP)
========================= */

const nodes = [

{
text:`NODE 0 // ENTRY

HERO COMMISSION ARCHIVE ACCESS GRANTED.

A file exists that should not be here.`,
next:1
},

{
text:`NODE 1

CLASSIFIED INCIDENT LOG:

"...this hero was never registered..."`,
next:2
},

{
text:`NODE 2

SYSTEM WARNING:

Repeated anomaly detected across records.`,
next:3
},

{
text:`NODE 3

OBSERVATION EFFECT DETECTED.

THE SYSTEM IS RESPONDING TO YOU.`,
next:4
},

{
text:`NODE 4

CROSS-NODE MATCH FOUND:

Designation appears everywhere: NORTH`,
next:5
},

{
text:`NODE 5

FINAL FILE AVAILABLE.`,
next:6
},

{
text:`NODE 6`
}

];

/* =========================
   ENGINE RENDER
========================= */

const scene = document.getElementById("scene");
const buttons = document.getElementById("buttons");
const log = document.getElementById("log");

function render(){

buttons.innerHTML="";

let node = nodes[state.progress];

scene.innerText = node.text;

let btn = document.createElement("button");
btn.innerText = state.progress < 6 ? "CONTINUE" : "VIEW DOSSIER";

btn.onclick = ()=>{
state.progress++;
state.visits++;
state.corruption += 0.8;
save();
render();
};

buttons.appendChild(btn);

if(state.progress === 6){
dossier();
}

}

/* =========================
   FINAL DOSSIER
========================= */

function dossier(){

buttons.innerHTML="";

log.style.display="block";

log.innerText =
`HERO COMMISSION DOSSIER

SUBJECT: NORTH

CLASSIFICATION:
UNREGISTERED HERO ENTITY

STATUS:
- persists across system records
- increases under observation
- cannot be fully contained
- appears across multiple nodes

COMMISSION NOTE:

"This is not a hero being discovered.
It is a system forming around him."

END OF FILE`;

}

/* INIT */

render();

</script>

</body>
</html>
