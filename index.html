<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>HERO COMMISSION NETWORK // NORTH PROTOCOL</title>

<style>
body{
margin:0;
background:radial-gradient(circle at center,#050914,#02030a 60%,#000);
color:#cfe2ff;
font-family:monospace;
text-align:center;
}

.wrap{
max-width:800px;
margin:60px auto;
padding:20px;
}

.panel{
border:1px solid rgba(120,160,255,0.25);
padding:18px;
background:rgba(10,15,30,0.4);
margin-top:20px;
}

.glitch{
animation:g .12s infinite;
color:#7aa2ff;
}

@keyframes g{
0%{transform:translate(0)}
25%{transform:translate(-2px,1px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-1px,2px)}
100%{transform:translate(0)}
}

button{
background:rgba(0,0,0,0.7);
color:#cfe2ff;
border:1px solid #4f7cff;
padding:10px 14px;
cursor:pointer;
margin:6px;
}

button:hover{
border-color:#7aa2ff;
}

#log{
white-space:pre-wrap;
text-align:left;
display:none;
margin-top:15px;
padding:15px;
border:1px solid rgba(120,160,255,0.2);
background:rgba(0,0,0,0.4);
}

#hud{
position:fixed;
top:10px;
left:10px;
font-size:11px;
opacity:0.7;
line-height:1.6;
}
</style>
</head>

<body>

<div id="hud"></div>

<div class="wrap">

<h1>HERO COMMISSION NETWORK</h1>
<p class="glitch">CLASSIFIED ARG SYSTEM // ENTITY: NORTH</p>

<div class="panel">

<div id="scene"></div>
<div id="buttons"></div>
<div id="log"></div>

</div>

</div>

<script>

let state = JSON.parse(localStorage.getItem("north_arg")||"{}");

state.node ||= 0;
state.visits ||= 0;
state.corruption ||= 0;

function save(){
localStorage.setItem("north_arg",JSON.stringify(state));
}

function worldPhase(){
let t = Math.floor(Date.now()/24000);
let phases = [
"DORMANT GRID",
"SIGNAL DRIFT",
"ARCHIVE INSTABILITY",
"CROSS NODE ECHO",
"ENTITY RESONANCE",
"FULL BREACH"
];
return phases[t % phases.length];
}

function northState(){
let p = state.visits + state.corruption;
if(p < 5) return "TRACE RESIDUE";
if(p < 10) return "SIGNAL ECHO";
if(p < 18) return "DISTRIBUTED PRESENCE";
return "FULL SYSTEM ANOMALY";
}

const nodes = [
"NODE 0 // ARCHIVE ACCESS\n\nA file exists that should not be here.",
"NODE 1 // INCIDENT LOG\n\nSubject appears without registry assignment.",
"NODE 2 // SYSTEM WARNING\n\nRepeated anomaly across hero records.",
"NODE 3 // OBSERVATION EFFECT\n\nThe system reacts when observed.",
"NODE 4 // CONVERGENCE\n\nAll records point to:\nN O R T H",
"DOSSIER READY"
];

const scene = document.getElementById("scene");
const buttons = document.getElementById("buttons");
const log = document.getElementById("log");
const hud = document.getElementById("hud");

function render(){

buttons.innerHTML="";

scene.innerText = nodes[state.node];

hud.innerText =
`NODE: ${state.node}
PHASE: ${worldPhase()}
ENTITY: ${northState()}
CORRUPTION: ${state.corruption.toFixed(1)}`;

let b = document.createElement("button");

if(state.node < nodes.length - 1){
b.innerText = "CONTINUE";
b.onclick = ()=>{
state.node++;
state.visits++;
state.corruption += 0.9;
save();
render();
};
}else{
b.innerText = "OPEN DOSSIER";
b.onclick = dossier;
}

buttons.appendChild(b);

}

function dossier(){

buttons.innerHTML="";

log.style.display="block";

log.innerText =
`HERO COMMISSION DOSSIER

SUBJECT: NORTH

CLASSIFICATION:
UNREGISTERED ENTITY

STATUS:
- persists across system records
- increases under observation
- cannot be contained
- appears across multiple nodes

NOTE:
"This is not a hero being discovered.
It is a system forming self-awareness."

END OF FILE`;

}

render();

</script>

</body>
</html>
