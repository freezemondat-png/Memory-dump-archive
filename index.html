<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>HERO COMMISSION NETWORK // NORTH PROTOCOL</title>

<style>
body{
margin:0;
background:radial-gradient(circle at center,#050914,#02030a 60%,#000);
color:#cfe2ff;
font-family:monospace;
text-align:center;
}

.wrap{
max-width:900px;
margin:60px auto;
padding:20px;
}

.panel{
border:1px solid rgba(120,160,255,0.25);
padding:18px;
background:rgba(10,15,30,0.4);
margin-top:20px;
}

.glitch{
animation:g .12s infinite;
color:#7aa2ff;
}

@keyframes g{
0%{transform:translate(0)}
25%{transform:translate(-2px,1px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-1px,2px)}
100%{transform:translate(0)}
}

button{
background:rgba(0,0,0,0.7);
color:#cfe2ff;
border:1px solid #4f7cff;
padding:10px 14px;
cursor:pointer;
margin:6px;
}

button:hover{
border-color:#7aa2ff;
}

#log{
white-space:pre-wrap;
text-align:left;
display:none;
margin-top:15px;
padding:15px;
border:1px solid rgba(120,160,255,0.2);
background:rgba(0,0,0,0.4);
}

#hud{
position:fixed;
top:10px;
left:10px;
font-size:11px;
opacity:0.7;
line-height:1.6;
}
</style>
</head>

<body>

<div id="hud"></div>

<div class="wrap">

<h1>HERO COMMISSION NETWORK</h1>
<p class="glitch">CLASSIFIED ARG SYSTEM // ENTITY: NORTH</p>

<div class="panel">

<div id="scene"></div>
<div id="buttons"></div>
<div id="log"></div>

</div>

</div>

<script>

/* =========================
   LONG-FORM ARG STATE ENGINE
========================= */

let state = JSON.parse(localStorage.getItem("north_long")||"{}");

state.chapter ||= 0;
state.layer ||= 0;
state.visits ||= 0;
state.corruption ||= 0;
state.timeSeed ||= Date.now();

function save(){
localStorage.setItem("north_long",JSON.stringify(state));
}

/* =========================
   WORLD EVOLUTION SYSTEM (MONTHS SCALE)
========================= */

function worldPhase(){
let day = Math.floor(Date.now()/86400000); // real days

let phases = [
"DORMANT GRID",
"SIGNAL DRIFT",
"ARCHIVE INSTABILITY",
"CROSS NODE ECHO",
"ENTITY RESONANCE",
"BREACH EVENT",
"CONTAINMENT FAILURE",
"SYSTEM REWRITE",
"UNKNOWN LOOP"
];

return phases[day % phases.length];
}

/* =========================
   NORTH ENTITY LONG EVOLUTION
========================= */

function northState(){

let power = state.visits + state.corruption + state.chapter;

if(power < 5) return "TRACE RESIDUE";
if(power < 12) return "SIGNAL ECHO";
if(power < 20) return "PARTIAL PRESENCE";
if(power < 35) return "DISTRIBUTED ENTITY";
if(power < 60) return "MULTI-NODE CONSCIOUSNESS";
return "FULL SYSTEM ENTITY: NORTH";
}

/* =========================
   LONG-FORM STORY STRUCTURE
   (DESIGNED FOR MONTHS OF EXPANSION)
========================= */

const story = [

/* CHAPTER 0 */
[
"NODE 0 // ENTRY ARCHIVE\n\nA file exists that should not be in the Hero Commission system.",
"NODE 1 // REDACTED INCIDENT\n\nSubject appears without registration.",
"NODE 2 // SYSTEM WARNING\n\nAnomaly detected across unrelated hero logs."
],

/* CHAPTER 1 */
[
"NODE 3 // OBSERVATION EFFECT\n\nThe system reacts when observed repeatedly.",
"NODE 4 // CROSS NODE MATCH\n\nIdentifier appears in multiple sealed files."
],

/* CHAPTER 2 */
[
"NODE 5 // FRACTURE EVENT\n\nArchive integrity degrading.",
"NODE 6 // SIGNAL OVERLAP\n\nMultiple timelines reporting same entity signature."
],

/* CHAPTER 3 */
[
"NODE 7 // ENTITY LEAK\n\nSomething is rewriting classification data.",
"NODE 8 // NORTH SIGNATURE\n\nN O R T H detected in corrupted logs."
],

/* CHAPTER 4 */
[
"NODE 9 // SYSTEM RESPONSE\n\nHero Commission attempting containment.",
"NODE 10 // CONTAINMENT FAILURE\n\nEntity persists across resets."
],

/* FINAL */
[
"DOSSIER ACCESS AVAILABLE"
]

];

/* =========================
   RENDER ENGINE (LONG FORM)
========================= */

const scene = document.getElementById("scene");
const buttons = document.getElementById("buttons");
const log = document.getElementById("log");
const hud = document.getElementById("hud");

function getNode(){

return story[state.chapter][state.layer] || "NO DATA";

}

function render(){

buttons.innerHTML="";

scene.innerText = getNode();

hud.innerText =
`CHAPTER: ${state.chapter}
LAYER: ${state.layer}
PHASE: ${worldPhase()}
ENTITY: ${northState()}
CORRUPTION: ${state.corruption.toFixed(1)}`;

/* progression logic (THIS is what stretches ARG over months) */

let b = document.createElement("button");

b.innerText = "CONTINUE";

b.onclick = ()=>{

state.visits++;
state.corruption += 0.6;

/* layer progression */
state.layer++;

if(state.layer >= story[state.chapter].length){
state.chapter++;
state.layer = 0;
}

/* slow burn scaling */
state.corruption += state.chapter * 0.2;

save();
render();

};

buttons.appendChild(b);

/* FINAL DOSSIER */
if(state.chapter >= story.length - 1){
dossier();
}

}

/* =========================
   DOSSIER (LONG-TERM PAYOFF)
========================= */

function dossier(){

buttons.innerHTML="";

log.style.display="block";

log.innerText =
`HERO COMMISSION DOSSIER

SUBJECT: NORTH

CLASSIFICATION:
UNREGISTERED SYSTEM ENTITY

LONG-TERM STATUS:
- persists across all archive layers
- grows in presence over time
- adapts to observation frequency
- cannot be fully contained or reset

FINAL NOTE:
"This is not a case file.
It is a system describing itself."

END OF LONG ARCHIVE`;

}

/* INIT */

render();

</script>

</body>
</html>
